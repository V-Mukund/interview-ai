services:
  db:
    image: postgres:15-alpine
    container_name: interview-ai-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
      POSTGRES_DB: ${DB_NAME:-interview_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  interview-ai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=db
    restart: always

volumes:
  postgres_data:
